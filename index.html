<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Role Play, Play, Roll</title>
    <meta name="application-name" content="Role Play, Play, Roll">
    <meta name="apple-mobile-web-app-title" content="Role Play, Play, Roll">
    <meta property="og:site_name" content="Role Play, Play, Roll">
    <meta property="og:title" content="Role Play, Play, Roll">
    <meta name="twitter:title" content="Role Play, Play, Roll">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage">
      <section class="roller" aria-labelledby="site-title">
        <p class="eyebrow">Live one-shot chaos generator</p>
        <h1 id="site-title">Role Play, Play, Roll</h1>
        <p class="intro">
          Roll the die. Trust the table. Commit to the bit.
        </p>

        <div class="result-wrap" aria-live="polite">
          <div class="die" id="result">20</div>
          <p class="result-label" id="result-label">Ready to roll</p>
        </div>
        <button id="roll-button" type="button">Roll d20</button>
        <a
          class="instagram-link"
          href="https://www.instagram.com/rapidfireimprov/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Follow Rapid Fire Improv on Instagram"
        >
          Follow @rapidfireimprov
        </a>
        <img
          class="rapid-fire-logo"
          src="https://dhftlfjula7qg.cloudfront.net/images/event/Rapid%20fire%20logo%20neon.png"
          alt="Rapid Fire Improv logo"
        >
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
